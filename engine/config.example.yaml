server:
  host: "127.0.0.1"
  port: 8080
  grpc:
    host: "127.0.0.1"
    port: 50051

daemon:
  host: "127.0.0.1"
  port: 50061
  required: true
  # If blank, the server auto-detects a locally built daemon in ./go/bin or ./rust/target/*.
  command: ""
  args: []
  startup_timeout: 15s
  restart_backoff: 3s
  ready_timeout: 10s
  llama_cli: "llama-cli"
  training_cli: "llama-train"

services:
  enable_training: false
  enable_mcp: false

storage:
  lancedb_uri: "~/ai-engine/lancedb"
  enable_fts: true
  enable_hybrid_search: true

runtime:
  models_path: "~/ai-engine/models"
  max_memory_mb: 8192
  providers: []

rag:
  storage_path: "~/ai-engine/lancedb"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 10

training:
  working_dir: "~/ai-engine/training"
  max_concurrent_jobs: 2

mcp:
  timeout: 30s
  retries: 3

logging:
  level: "info"
  format: "json"
