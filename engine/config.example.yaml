server:
  host: "127.0.0.1"
  port: 8080
  mode: "production"
  grpc:
    host: "127.0.0.1"
    port: 50051
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "app://ai-engine"
    allowed_headers:
      - "Content-Type"
      - "Authorization"

daemon:
  host: "127.0.0.1"
  port: 50061
  required: true
  # If blank, the server auto-detects a locally built daemon in ./go/bin or ./rust/target/*.
  command: ""
  args: []
  startup_timeout: 15s
  restart_backoff: 3s
  ready_timeout: 10s
  llama_cli: "llama-cli"
  training_cli: "llama-train"

services:
  enable_training: false
  enable_mcp: false

storage:
  lancedb_uri: "~/ai-engine/lancedb"
  enable_fts: true
  enable_hybrid_search: true

runtime:
  models_path: "~/ai-engine/models"
  # Embedded Rust runtime backend. Use "mistralrs" for real local inference or "mock" for deterministic tests.
  backend: "mistralrs"
  max_memory_mb: 8192
  mistralrs:
    force_cpu: false
    max_num_seqs: 32
    auto_isq: ""
  providers:
    # Optional sidecar validation path: run `mistralrs serve --port 1234 -m <model>` and use this provider.
    - name: "mistralrs-sidecar"
      type: "openai-compatible"
      url: "http://127.0.0.1:1234/v1"
      api_key: ""

context:
  enabled: true
  service_url: "http://127.0.0.1:9191"
  # Resolved relative to the installed server bundle, not the caller's working directory.
  binary_path: "context_server"
  data_dir: "~/ai-engine/context"
  auto_start: true
  startup_timeout: 20s
  managed_roots:
    - "workspace=."
  openviking:
    url: ""
    api_key: ""

rag:
  storage_path: "~/ai-engine/lancedb"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 10

training:
  working_dir: "~/ai-engine/training"
  max_concurrent_jobs: 2

mcp:
  timeout: 30s
  retries: 3

logging:
  level: "info"
  format: "json"
